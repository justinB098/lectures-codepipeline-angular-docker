version: 0.2
phases:
  pre_build:
    commands:
      - echo ${DOCKERHUB_TOKEN} | podman login -u ${DOCKEHUB_USER} --password-stdin
  build:
    commands:
      - podman build -t my-angular-app:latest .
  post_build:
    commands:
      - podman tag my-angular-app:latest ${DOCKERHUB_USER}/my-angular-app:latest
      - podman push ${DOCKERHUB_USER}/my-angular-app:latest